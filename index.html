<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify - Web Player: Music for everyone</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="./assets/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <div class="navbar">
    <div class="nav-left">
      <div class="spot-img">
        <img src="./assets/logo.png" style="height: 35px; width: 35px;">
      </div>
      <div class="circle-icon">
        <i class="fa-solid fa-house"></i>
      </div>
    </div>
    <div class="nav-center">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="what do you want to play?">
      <i class="fa-regular fa-folder"></i>
    </div>
    <div class="nav-right">
      <a href="#" class="hide">Premium</a>
      <a href="#" class="hide">Support</a>
      <a href="#" class="hide">Download</a>
      <span class="divider"></span>
      <a href="#"><i class="fa-regular fa-circle-down"></i>Install</a>
      <a href="#">Sign Up</a>
      <button class="login-btn">Log In</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="nav">
        <h4>Your Library</h4>
        <button class="badge">
          <i class="fa-solid fa-plus"></i>
          Create
        </button>
      </div>
      <div class="lib-box">
        <div class="box">
          <p class="box-p1">Create your first playlist</p>
          <p class="box-p2">It's easy, we'll help you</p>
          <button class="badge-b">Create playlist</button>
        </div>
        <div class="box">
          <p class="box-p1">Let's find some podcasts to follow</p>
          <p class="box-p2">We'll keep you updated on new episode</p>
          <button class="badge-b">Browse Posdcasts</button>
        </div>
      </div>
    </div>
    <div class="main-content">Main Content</div>
    <div class="music-player">Music Player</div>
  </div>

</body>

</html>
